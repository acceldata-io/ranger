{{- if .Values.rbac.create -}}
# Scoped to a single ConfigMap in the YuniKorn namespace.
# We grant get/update/patch only — no list, no delete, no other configmaps.
# This is the minimum the agent needs to read and CAS-update queues.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent.fullname" . }}
  namespace: {{ .Values.yunikorn.namespace | quote }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ .Values.yunikorn.configMap | quote }}]
    verbs: ["get", "update", "patch"]
{{- end }}
