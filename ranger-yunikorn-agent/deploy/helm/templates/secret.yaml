{{- /*
  Secret is created only when:
    - the user provided inline credentials (ranger.auth.principal + .credential), AND
    - they did NOT specify an existingSecret to use instead.

  In production the recommended path is:
    - ranger.auth.existingSecret: my-secret
  This way the credential lives outside Helm's release state.
*/ -}}
{{- if and .Values.ranger.auth.principal .Values.ranger.auth.credential (not .Values.ranger.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent.credentialSecretName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.ranger.auth.existingSecretPrincipalKey | default "user" }}: {{ .Values.ranger.auth.principal | quote }}
  {{ .Values.ranger.auth.existingSecretCredentialKey | default "password" }}: {{ .Values.ranger.auth.credential | quote }}
{{- end }}
