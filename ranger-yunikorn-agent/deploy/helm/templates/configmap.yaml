apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
data:
  agent.properties: |
    # Generated by the ranger-yunikorn-agent Helm chart.
    # See values.yaml for the source of these settings.

    ranger.admin.url={{ required "ranger.adminUrl is required" .Values.ranger.adminUrl }}
    ranger.service.name={{ required "ranger.serviceName is required" .Values.ranger.serviceName }}
    ranger.service.type={{ default "yunikorn" .Values.ranger.serviceType }}
    ranger.auth.mode={{ default "basic" .Values.ranger.auth.mode }}

    {{- if eq (default "basic" .Values.ranger.auth.mode) "kerberos" }}
    {{- $kerb := .Values.ranger.auth.kerberos }}
    kerberos.principal={{ required "ranger.auth.kerberos.principal is required when auth.mode=kerberos" $kerb.principal }}
    kerberos.keytab.path=/etc/security/keytabs/{{ default "agent.keytab" $kerb.keytabKey }}
    {{- if $kerb.krb5ConfigMap }}
    kerberos.krb5.conf.path=/etc/krb5/{{ default "krb5.conf" $kerb.krb5ConfigKey }}
    {{- end }}
    {{- end }}

    {{- $tls := .Values.ranger.tls }}
    {{- if $tls.insecure }}
    ranger.ssl.insecure=true
    {{- end }}
    {{- if and $tls.secret $tls.truststoreKey }}
    ranger.ssl.truststore.path=/etc/ranger-tls/{{ $tls.truststoreKey }}
    {{- if $tls.truststoreType }}
    ranger.ssl.truststore.type={{ $tls.truststoreType }}
    {{- end }}
    {{- end }}

    yunikorn.namespace={{ .Values.yunikorn.namespace }}
    yunikorn.configmap={{ .Values.yunikorn.configMap }}
    yunikorn.conf.key={{ .Values.yunikorn.configKey }}
    {{- if .Values.yunikorn.restUrl }}
    yunikorn.rest.url={{ .Values.yunikorn.restUrl }}
    {{- end }}

    preflight.enabled={{ .Values.preflight.enabled }}

    sync.poll.interval.ms={{ int .Values.sync.pollIntervalMs }}
    sync.force.resync.ms={{ int64 .Values.sync.forceResyncMs }}

    doctrine={{ .Values.doctrine }}
    policy.cache.dir={{ .Values.policyCacheDir }}
