# ============================================================================
# ranger-yunikorn-agent — raw Kubernetes manifests
#
# Generated from deploy/helm by `helm template`. Use this if you don't run
# Helm. To regenerate:
#
#   cd deploy/helm
#   helm template ranger-yunikorn-agent . \
#       --namespace yunikorn \
#       --set ranger.adminUrl=REPLACE_ME_RANGER_URL \
#       --set ranger.serviceName=REPLACE_ME_SERVICE_NAME \
#       --set image.repository=acceldata/ranger-yunikorn-agent \
#       --set image.tag=0.1.0-SNAPSHOT \
#       --set ranger.auth.existingSecret=ranger-yunikorn-agent-creds \
#     > ../manifests/all.yaml
#
# Before applying:
#   1. Replace REPLACE_ME_RANGER_URL and REPLACE_ME_SERVICE_NAME below.
#   2. Create the credential Secret separately:
#        kubectl -n yunikorn create secret generic ranger-yunikorn-agent-creds \
#            --from-literal=user=svc-yunikorn \
#            --from-literal=password=<password>
#   3. kubectl apply -f all.yaml
# ============================================================================

---
