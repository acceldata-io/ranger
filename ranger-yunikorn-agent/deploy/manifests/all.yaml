metadata:
  name: ranger-yunikorn-agent
  namespace: "yunikorn"
  labels:
    app.kubernetes.io/name: ranger-yunikorn-agent
    app.kubernetes.io/instance: ranger-yunikorn-agent
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ranger-yunikorn-agent-0.1.0
---
# Source: ranger-yunikorn-agent/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranger-yunikorn-agent-config
  namespace: "yunikorn"
  labels:
    app.kubernetes.io/name: ranger-yunikorn-agent
    app.kubernetes.io/instance: ranger-yunikorn-agent
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ranger-yunikorn-agent-0.1.0
data:
  agent.properties: |
    # Generated by the ranger-yunikorn-agent Helm chart.
    # See values.yaml for the source of these settings.

    ranger.admin.url=REPLACE_ME_RANGER_URL
    ranger.service.name=REPLACE_ME_SERVICE_NAME

    yunikorn.namespace=yunikorn
    yunikorn.configmap=yunikorn-configs
    yunikorn.conf.key=queues.yaml

    preflight.enabled=true

    sync.poll.interval.ms=30000
    sync.force.resync.ms=86400000

    doctrine=LENIENT
    policy.cache.dir=/var/cache/ranger-yunikorn-agent
---
# Source: ranger-yunikorn-agent/templates/role.yaml
# Scoped to a single ConfigMap in the YuniKorn namespace.
# We grant get/update/patch only — no list, no delete, no other configmaps.
# This is the minimum the agent needs to read and CAS-update queues.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ranger-yunikorn-agent
  namespace: "yunikorn"
  labels:
    app.kubernetes.io/name: ranger-yunikorn-agent
    app.kubernetes.io/instance: ranger-yunikorn-agent
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ranger-yunikorn-agent-0.1.0
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["yunikorn-configs"]
    verbs: ["get", "update", "patch"]
---
# Source: ranger-yunikorn-agent/templates/rolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ranger-yunikorn-agent
  # Binding lives in the YuniKorn namespace (where the Role is) so the SA
  # in the agent's namespace can access the ConfigMap there.
  namespace: "yunikorn"
  labels:
    app.kubernetes.io/name: ranger-yunikorn-agent
    app.kubernetes.io/instance: ranger-yunikorn-agent
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ranger-yunikorn-agent-0.1.0
subjects:
  - kind: ServiceAccount
    name: ranger-yunikorn-agent
    namespace: "yunikorn"
roleRef:
  kind: Role
  name: ranger-yunikorn-agent
  apiGroup: rbac.authorization.k8s.io
---
# Source: ranger-yunikorn-agent/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranger-yunikorn-agent
  namespace: "yunikorn"
  labels:
    app.kubernetes.io/name: ranger-yunikorn-agent
    app.kubernetes.io/instance: ranger-yunikorn-agent
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ranger-yunikorn-agent-0.1.0
spec:
  replicas: 1
  # Recreate (not RollingUpdate): only ever one agent active at a time so
  # we never have two replicas racing on the same ConfigMap CAS.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ranger-yunikorn-agent
      app.kubernetes.io/instance: ranger-yunikorn-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ranger-yunikorn-agent
        app.kubernetes.io/instance: ranger-yunikorn-agent
      annotations:
        # Roll the pod whenever the agent's config changes.
        checksum/config: 79b01f67ded67b6f38106e54b68f2b6714fe2063976efbe621f7aa2a3f8ef9ac
        checksum/secret: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
    spec:
      serviceAccountName: ranger-yunikorn-agent
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: "acceldata/ranger-yunikorn-agent:0.1.0-SNAPSHOT"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RANGER_PRINCIPAL
              valueFrom:
                secretKeyRef:
                  name: ranger-yunikorn-agent-creds
                  key: "user"
            - name: RANGER_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: ranger-yunikorn-agent-creds
                  key: "password"
          volumeMounts:
            - name: config
              mountPath: /etc/ranger-yunikorn-agent
              readOnly: true
            - name: cache
              # Matches values.yaml policyCacheDir; if you override that you
              # must also override the volume's mountPath here. (Helm chart
              # could template this, but the indirection isn't worth it for
              # the rare case anyone changes the default.)
              mountPath: /var/cache/ranger-yunikorn-agent
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 768Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: ranger-yunikorn-agent-config
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
