# Default configuration for ranger-yunikorn-agent.
#
# This file is shipped inside the image as a reference. Operators override
# values by mounting their own agent.properties into ${AGENT_CONF_DIR}
# (defaults to /etc/ranger-yunikorn-agent).
#
# Required values are intentionally left blank below so a missing override
# fails fast with a clear "Missing required property X" error at startup.

# --- Ranger Admin connection (REQUIRED) -------------------------------------
ranger.admin.url=
ranger.service.name=

# Service-TYPE registered in Ranger (the "name" field in the service-def JSON,
# NOT the service-name instance). Defaults to "yunikorn"; override only when
# Ranger has the def registered under a different name (e.g. "yunikorn2").
# ranger.service.type=yunikorn

# --- Authentication ---------------------------------------------------------
# How the agent authenticates to Ranger Admin. Two modes:
#
#   basic    (default)  Uses HTTP basic auth via RANGER_PRINCIPAL/RANGER_CREDENTIAL
#                       env vars. Routed through our own RangerHttpClient.
#                       Works with any vanilla Ranger that accepts basic auth.
#
#   kerberos            Uses a keytab login through Hadoop UGI, routed through
#                       the official RangerAdminRESTClient. Requires:
#                         - kerberos.principal       (e.g. agent/host@REALM)
#                         - kerberos.keytab.path     (mounted from a K8s Secret)
#                         - kerberos.krb5.conf.path  (optional, defaults to
#                                                     JVM's krb5.conf)
ranger.auth.mode=basic

# kerberos.principal=ranger-yunikorn-agent/agent-host@YOUR.REALM
# kerberos.keytab.path=/etc/security/keytabs/ranger-yunikorn-agent.keytab
# kerberos.krb5.conf.path=/etc/krb5.conf

# --- TLS to Ranger Admin (when ranger.admin.url is https) -------------------
# ODP Ranger Admin almost always runs behind TLS with a certificate signed by
# an internal/private CA the JRE does not trust by default. Point the agent at
# a truststore that trusts Ranger's server certificate.
#
# The truststore FILE is referenced by path (mount it into the pod). Its
# password (if any) comes from the RANGER_SSL_TRUSTSTORE_PASSWORD env var,
# sourced from a K8s Secret. Type defaults to JKS; set PKCS12 if needed.
#
# ranger.ssl.truststore.path=/etc/ranger-tls/truststore.jks
# ranger.ssl.truststore.type=JKS
#
# DEV ONLY: skip certificate AND hostname verification (like curl -k). Never
# use in production — it allows man-in-the-middle. Overrides any truststore.
# ranger.ssl.insecure=false

# --- YuniKorn ConfigMap target (defaults shown) -----------------------------
yunikorn.namespace=yunikorn
yunikorn.configmap=yunikorn-configs
yunikorn.conf.key=queues.yaml

# --- YuniKorn REST endpoint for preflight (optional) ------------------------
# When preflight.enabled=true AND yunikorn.rest.url is set, the agent POSTs the
# spliced YAML to <rest.url>/ws/v1/validate-conf and refuses to write the
# ConfigMap unless YuniKorn accepts it (fail-closed: a rejection OR an
# unreachable endpoint both abort the write, and the agent retries next cycle).
#
# If preflight.enabled=true but yunikorn.rest.url is blank, preflight is SKIPPED
# with a startup warning. Set preflight.enabled=false to opt out silently.
#
# The YuniKorn scheduler's web service typically listens on 9080:
#   yunikorn.rest.url=http://yunikorn-service.yunikorn.svc:9080
yunikorn.rest.url=
preflight.enabled=true

# --- Sync cadence -----------------------------------------------------------
sync.poll.interval.ms=30000
sync.force.resync.ms=86400000

# --- Doctrine for queues with no Ranger policy ------------------------------
# LENIENT: leave existing ACL fields untouched on unmanaged queues.
# STRICT:  clear ACL fields (default-deny) on unmanaged queues.
doctrine=LENIENT
