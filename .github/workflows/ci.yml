# GitHub Actions CI for ranger-yunikorn-agent.
#
#   - On every PR / push: build, run unit tests, lint the Helm chart.
#   - On push to main:    additionally build and push the container image.
#
# Image push target is configurable via the IMAGE_REPO repo variable; falls
# back to a placeholder so forks don't accidentally try to push.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: mvn -B -s .github/maven-settings.xml verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: helm lint
        run: |
          helm lint deploy/helm \
              --set ranger.adminUrl=https://ranger.example:6182 \
              --set ranger.serviceName=test \
              --set image.repository=acceldata/ranger-yunikorn-agent
      - name: helm template (smoke test)
        run: |
          helm template ranger-yunikorn-agent deploy/helm \
              --namespace yunikorn \
              --set ranger.adminUrl=https://ranger.example:6182 \
              --set ranger.serviceName=test \
              --set image.repository=acceldata/ranger-yunikorn-agent \
              --set ranger.auth.existingSecret=foo \
              > /tmp/rendered.yaml
          # Cheap sanity check: rendered YAML must parse
          python3 -c "import yaml,sys; list(yaml.safe_load_all(open('/tmp/rendered.yaml')))"

  image:
    name: Build and push image
    needs: [test, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: mvn -B -s .github/maven-settings.xml -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to image registry
        if: vars.IMAGE_REPO != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        if: vars.IMAGE_REPO != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.IMAGE_REPO }}:${{ github.sha }}
            ${{ vars.IMAGE_REPO }}:latest
